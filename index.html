<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>💰 가계부</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f7f5f0;--surf:#fff;--border:#e8e4dc;--bh:#cfc8bb;--txt:#1a1714;--txt2:#6b6560;--txt3:#aaa49c;--acc:#2d2a26;--red:#c0392b;--grn:#0f6e56;--r:10px;--rs:6px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;overflow-x:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt)}
.app-wrap{max-width:880px;margin:0 auto;padding:.75rem .9rem 5rem}
.app-title{font-family:'Gmarket Sans',sans-serif;font-size:22px;font-weight:700;letter-spacing:-1px;margin-bottom:1rem}
.bottom-tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--surf);border-top:1px solid var(--border);z-index:100}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 10px;cursor:pointer;background:none;border:none;font-family:'Noto Sans KR',sans-serif;font-size:10px;color:var(--txt3);gap:3px}
.btab.active{color:var(--acc);font-weight:500}
.btab-icon{font-size:18px;line-height:1}
.screen{display:none}.screen.active{display:block}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:.75rem}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:.6rem .9rem;background:var(--bg);border-bottom:1px solid var(--border)}
.card-title{font-size:12px;font-weight:500;color:var(--txt)}
.mbtn{padding:5px 13px;font-size:12px;border-radius:var(--rs);cursor:pointer;border:1px solid var(--border);background:none;color:var(--txt2);font-family:'Noto Sans KR',sans-serif}
.mbtn:active{background:var(--bg)}
.mbtn.primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.mbtn.sm{padding:3px 9px;font-size:11px}
.mbtn.danger{color:var(--red);border-color:var(--red)}
.month-nav{display:flex;align-items:center;gap:8px}
.navbtn{width:28px;height:28px;border:1px solid var(--border);border-radius:50%;background:var(--surf);color:var(--txt2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.navbtn:active{background:var(--bg)}
.mlbl{font-size:13px;font-weight:500;min-width:72px;text-align:center;font-family:'Gmarket Sans',sans-serif}
.sum3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:.75rem}
.sc{background:var(--surf);border:1px solid var(--border);border-radius:var(--rs);padding:.55rem .7rem}
.sc-lbl{font-size:10px;color:var(--txt3);margin-bottom:2px}
.sc-val{font-size:14px;font-weight:500}
.sc-val.red{color:var(--red)}.sc-val.grn{color:var(--grn)}
.bar-box{background:var(--surf);border:1px solid var(--border);border-radius:var(--rs);padding:.55rem .8rem;margin-bottom:.75rem}
.bar-top{display:flex;justify-content:space-between;font-size:11px;color:var(--txt2);margin-bottom:4px}
.trk{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.fill{height:100%;border-radius:3px;transition:width .3s}
.dh{text-align:center;font-size:10px;color:var(--txt3);padding:3px 0}
.cal-outer{display:grid;grid-template-columns:1fr 160px;gap:8px;align-items:start}
@media(max-width:600px){.cal-outer{grid-template-columns:1fr}}
.cal-dhd{display:grid;grid-template-columns:repeat(7,1fr) 58px;gap:2px;margin-bottom:2px}
@media(max-width:600px){.cal-dhd{grid-template-columns:repeat(7,1fr) 48px}}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr) 58px;gap:2px}
@media(max-width:600px){.cal-grid{grid-template-columns:repeat(7,1fr) 48px}}
.cday{min-height:88px;border:1px solid var(--border);border-radius:var(--rs);padding:4px 3px;cursor:pointer;background:var(--surf);position:relative;overflow:hidden;transition:border-color .12s}
@media(max-width:600px){.cday{min-height:68px}}
.cday:active{border-color:var(--bh)}
.cday.om{opacity:.2;cursor:default;background:none;border-color:transparent}
.cday.td{border-color:var(--acc);border-width:1.5px}
.cday.td .dn{background:var(--acc);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.dn{font-size:10px;color:var(--txt2);width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-weight:500;margin-bottom:1px}
.dn.sun{color:var(--red)}
.dtot{font-size:8.5px;font-weight:500;color:var(--red);margin-bottom:2px}
.cbadge{font-size:8px;padding:2px 3px;border-radius:4px;display:flex;justify-content:space-between;gap:2px;margin-bottom:1px}
.cbadge .bn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.cbadge .ba{font-weight:500;white-space:nowrap;flex-shrink:0}
.hint{position:absolute;bottom:2px;right:2px;font-size:7px;color:var(--txt3);opacity:0;transition:opacity .12s}
.swipe-hint{display:none;position:fixed;right:0;top:50%;transform:translateY(-50%);background:var(--acc);color:#fff;font-size:11px;padding:10px 5px;border-radius:var(--r) 0 0 var(--r);writing-mode:vertical-rl;text-orientation:mixed;z-index:130;cursor:pointer;letter-spacing:.5px}
@media(max-width:640px){.swipe-hint{display:block}}
.cday:hover .hint{opacity:1}
.wcell{border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 2px;text-align:center}
.wlbl{font-size:7.5px;color:var(--txt3);margin-bottom:2px;font-weight:500}
.wamt{font-size:9px;font-weight:500;color:var(--txt)}
.side-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
@media(max-width:640px){
  .side-card{display:block;position:fixed;right:0;top:0;bottom:0;width:75vw;max-width:280px;z-index:150;border-radius:var(--r) 0 0 var(--r);box-shadow:-4px 0 20px rgba(0,0,0,.15);transform:translateX(100%);transition:transform .25s ease;overflow-y:auto}
  .side-card.open{transform:translateX(0)}
  .side-drawer-backdrop{display:block}
}
.side-drawer-backdrop{display:none;position:fixed;inset:0;z-index:140;background:rgba(0,0,0,.25)}
.side-title{font-size:11px;font-weight:500;padding:.5rem .7rem;background:var(--bg);border-bottom:1px solid var(--border)}
.br{display:grid;grid-template-columns:1fr auto;align-items:center;gap:4px;padding:4px .65rem;border-bottom:1px solid var(--border);font-size:10px}
.br:last-child{border-bottom:none}
.brn{display:flex;align-items:center;gap:3px;color:var(--txt);font-weight:500}
.brd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.brr{text-align:right}
.brl{font-size:10px;font-weight:500}
.brl.red{color:var(--red)}.brl.grn{color:var(--grn)}
.brsub{font-size:9px;color:var(--txt3)}
.minitrk{height:3px;background:var(--bg);border-radius:2px;overflow:hidden;margin-top:2px}
.minifill{height:100%;border-radius:2px}
.gift-note{font-size:9px;color:#6c5ce7;margin-top:1px}
.budget-outer{display:grid;grid-template-columns:1fr 210px;gap:10px;align-items:start}
@media(max-width:640px){.budget-outer{grid-template-columns:1fr}}
.b-dhd{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.b-cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.bday{min-height:110px;border:1px solid var(--border);border-radius:var(--rs);padding:5px 4px;cursor:pointer;background:var(--surf);position:relative;overflow:hidden;transition:border-color .12s}
@media(max-width:640px){.bday{min-height:82px}}
.bday:active{border-color:var(--bh)}
.bday.om{opacity:.2;cursor:default;background:none;border-color:transparent}
.bday.td{border-color:var(--acc);border-width:1.5px}
.bday.td .dn{background:var(--acc);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.bday.has-data{border-color:#AFA9EC}
.appt-pill{font-size:9px;padding:2px 4px;border-radius:5px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appt-pill.lunch{background:#fff8ee;color:#7a4d05}
.appt-pill.dinner{background:#f0eeff;color:#3d2fb0}
.budget-entry{font-size:8.5px;padding:2px 4px;border-radius:4px;display:flex;justify-content:space-between;gap:2px;margin-bottom:1px}
.budget-entry .be-cat{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.budget-entry .be-amt{font-weight:500;flex-shrink:0}
.day-sep{height:1px;background:var(--border);margin:2px 0}
.budget-side{display:flex;flex-direction:column;gap:8px}
@media(max-width:640px){
  .budget-side{display:flex;position:fixed;right:0;top:0;bottom:0;width:78vw;max-width:290px;z-index:150;flex-direction:column;gap:0;overflow-y:auto;border-radius:var(--r) 0 0 var(--r);box-shadow:-4px 0 20px rgba(0,0,0,.15);transform:translateX(100%);transition:transform .25s ease;background:var(--bg)}
  .budget-side.open{transform:translateX(0)}
  .budget-side .card{border-radius:0;margin-bottom:0;border-left:none;border-right:none;border-top:none}
  .budget-side .card:first-child{border-top:none}
}
.cat-brow{display:grid;grid-template-columns:1fr 55px 52px;align-items:center;gap:5px;padding:5px .75rem;border-bottom:1px solid var(--border);font-size:10px}
.cat-brow:last-child{border-bottom:none}
.ftotal{display:flex;justify-content:space-between;padding:.45rem .75rem;font-size:11px;font-weight:500;background:var(--bg);border-top:1px solid var(--border)}
.frow{display:flex;justify-content:space-between;padding:5px .75rem;font-size:11px;border-bottom:1px solid var(--border)}
.frow:last-child{border-bottom:none}
.mg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:.65rem}
@media(max-width:500px){.mg-grid{grid-template-columns:repeat(3,1fr)}}
.mg-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:.55rem .65rem;cursor:pointer;transition:border-color .12s}
.mg-card:active{border-color:var(--bh)}
.mg-card.has{border-color:var(--grn)}
.mg-card.this-month{background:#EEEDFE;border-color:#7F77DD;border-width:1.5px}
.mg-card.this-month .mg-month{color:#3C3489}
.mg-item-val.current{color:#185FA5}
.proj-badge{font-size:9px;padding:1px 6px;border-radius:8px;background:#EEEDFE;color:#3C3489;font-weight:500;white-space:nowrap}
.proj-box{background:#EEEDFE;border-radius:var(--rs);padding:.5rem .65rem;margin-top:.55rem}
.proj-lbl{font-size:9px;color:#534AB7;margin-bottom:2px}
.proj-val{font-size:12px;font-weight:500;color:#3C3489}
.cslide-hdr{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem .55rem;border-bottom:1px solid var(--border)}
.cslide-date{font-size:15px;font-weight:700;font-family:'Gmarket Sans',sans-serif;flex:1;text-align:center;color:var(--txt)}
.cslide-nav{width:28px;height:28px;border:1px solid var(--border);border-radius:50%;background:var(--surf);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--txt2);flex-shrink:0}
.cslide-nav:active{background:var(--bg)}
.mg-month{font-size:10px;color:var(--txt3);margin-bottom:4px;font-weight:500}
.mg-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mg-item-lbl{font-size:9px;color:var(--txt3);margin-bottom:2px}
.mg-item-val{font-size:11px;font-weight:500;color:var(--txt)}
.mg-item-val.actual{color:var(--grn)}
.mg-bar{height:3px;background:var(--surf);border-radius:2px;overflow:hidden;margin-top:5px}
.mg-fill{height:100%;border-radius:2px;background:var(--grn)}
.mg-total{padding:.45rem .9rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:11px;font-weight:500;background:var(--bg)}
.asset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:.65rem}
@media(max-width:500px){.asset-grid{grid-template-columns:repeat(2,1fr)}}
.asset-c{background:var(--bg);border-radius:var(--rs);padding:.45rem .6rem;position:relative}
.asset-lbl{font-size:9px;color:var(--txt3);margin-bottom:2px}
.asset-v{font-size:12px;font-weight:500}
.int-badge{display:inline-block;font-size:8.5px;padding:1px 5px;border-radius:8px;background:#EEEDFE;color:#534AB7;font-weight:500;margin-top:2px}
.int-acc{font-size:9px;color:#3C3489;margin-top:1px}
.proj-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:.75rem}
.proj-head{padding:.5rem .9rem;background:var(--bg);border-bottom:1px solid var(--border);font-size:11px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
.proj-grid-3{display:grid;grid-template-columns:repeat(3,1fr)}
.proj-col{padding:.6rem .75rem;text-align:center;border-right:1px solid var(--border)}
.proj-col:last-child{border-right:none}
.proj-col-lbl{font-size:9px;color:var(--txt3);margin-bottom:3px}
.proj-col-val{font-size:13px;font-weight:500}
.proj-col-add{font-size:9px;margin-top:2px}
.proj-y1 .proj-col-val,.proj-y1 .proj-col-add{color:#185FA5}
.proj-y3 .proj-col-val,.proj-y3 .proj-col-add{color:#534AB7}
.proj-y5 .proj-col-val,.proj-y5 .proj-col-add{color:#0f6e56}
.proj-rate-row{display:flex;gap:8px;align-items:center;padding:.45rem .9rem;border-top:1px solid var(--border);font-size:11px;color:var(--txt2)}
.proj-rate-row input{width:60px;padding:3px 6px;border:1px solid var(--border);border-radius:var(--rs);font-size:11px;text-align:center;background:var(--bg);color:var(--txt)}
.asset-lbl{font-size:9px;color:var(--txt3);margin-bottom:2px}
.asset-v{font-size:12px;font-weight:500}
.pie-wrap{display:grid;grid-template-columns:160px 1fr;gap:12px;align-items:center;padding:.75rem}
@media(max-width:480px){.pie-wrap{grid-template-columns:1fr;justify-items:center}}
.pie-legend{display:flex;flex-direction:column;gap:5px}
.ple{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--txt2)}
.ple-l{display:flex;align-items:center;gap:5px}
.ple-sq{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.modal-backdrop{position:fixed;inset:0;background:rgba(26,23,20,.45);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
@media(min-width:601px){.modal-backdrop{align-items:center;padding:1rem}}
.modal{background:var(--surf);border-radius:18px 18px 0 0;padding:1.4rem 1.25rem 2rem;width:100%;max-height:88vh;overflow-y:auto;animation:slideUp .22s ease}
@media(min-width:601px){.modal{border-radius:16px;max-width:340px;animation:fadeUp .18s ease}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
@keyframes fadeUp{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.modal h3{font-family:'Gmarket Sans',sans-serif;font-size:16px;font-weight:700;margin-bottom:.25rem;letter-spacing:-.3px}
.modal select,.modal input{width:100%;margin-bottom:.55rem;font-size:14px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);outline:none}
.modal input:focus,.modal select:focus{border-color:var(--acc)}
.type-row{display:flex;gap:6px;margin-bottom:.55rem}
.tchip{flex:1;padding:8px 0;font-size:12px;border-radius:var(--rs);cursor:pointer;text-align:center;border:1px solid var(--border);background:none;color:var(--txt2);font-family:'Noto Sans KR',sans-serif}
.tchip.sl{background:#fff8ee;color:#7a4d05;border-color:#e8940a}
.tchip.sd{background:#f0eeff;color:#3d2fb0;border-color:#6c5ce7}
.mfooter{display:flex;gap:8px;margin-top:.7rem}
.mfooter .mbtn{flex:1;padding:11px;font-size:13px;text-align:center;border-radius:var(--rs)}
.ev-item{display:flex;align-items:center;gap:5px;padding:5px 7px;border-radius:var(--rs);margin-bottom:3px;font-size:12px}
.ev-del{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:14px;line-height:1;margin-left:auto;padding:2px 4px}
.ev-del:hover{color:var(--red)}
.sgap{margin-top:.65rem;border-top:1px solid var(--border);padding-top:.55rem}
.slbl{font-size:10px;color:var(--txt3);margin-bottom:5px;font-weight:500}
.sec-title{font-size:11px;font-weight:500;color:var(--txt);margin-bottom:.5rem}
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:var(--acc);color:#fff;font-size:12px;padding:7px 18px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="lock-overlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="font-family:'Gmarket Sans',sans-serif;font-size:26px;font-weight:700;color:var(--acc)">💰 가계부</div>
  <div style="font-size:13px;color:var(--txt3);margin-bottom:4px">비밀번호를 입력하세요</div>
  <input id="lock-input" type="password" placeholder="비밀번호" style="width:200px;font-size:16px;padding:12px 16px;border:1px solid var(--border);border-radius:var(--r);background:var(--surf);color:var(--txt);text-align:center;outline:none;font-family:'Noto Sans KR',sans-serif" onkeydown="if(event.key==='Enter')tryUnlock()"/>
  <button onclick="tryUnlock()" style="width:200px;padding:12px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer">입력</button>
</div>
<div class="app-wrap">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <div class="app-title" style="margin-bottom:0">💰 가계부</div>
    <button onclick="openPwSet()" style="background:none;border:1px solid var(--border);border-radius:var(--rs);padding:4px 10px;font-size:11px;color:var(--txt3);cursor:pointer;font-family:'Noto Sans KR',sans-serif">🔒 비번설정</button>
  </div>

  <div class="screen active" id="sc-ledger">
    <div style="display:flex;align-items:center;margin-bottom:.7rem">
      <div class="month-nav"><button class="navbtn" id="lprev">&#8249;</button><span class="mlbl" id="lmlbl"></span><button class="navbtn" id="lnext">&#8250;</button></div>
    </div>
    <div class="sum3">
      <div class="sc"><div class="sc-lbl">이번 달 지출</div><div class="sc-val red" id="l-spent">₩0</div></div>
      <div class="sc"><div class="sc-lbl">월 예산</div><div class="sc-val" id="l-budget">₩0</div></div>
      <div class="sc"><div class="sc-lbl">남은 예산</div><div class="sc-val grn" id="l-left">₩0</div></div>
    </div>
    <div class="bar-box"><div class="bar-top"><span>예산 사용률</span><span id="l-pct">0%</span></div><div class="trk"><div class="fill" id="l-fill" style="width:0%;background:var(--grn)"></div></div></div>
    <div class="cal-outer">
      <div><div class="cal-dhd" id="l-dhd"></div><div class="cal-grid" id="l-cgrid"></div></div>
      <div class="side-card" id="l-side-panel"><div class="side-title">카테고리별 잔여 예산</div><div id="l-side"></div></div>
    </div>
  </div>

  <div class="screen" id="sc-budget">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;flex-wrap:wrap;gap:8px">
      <div class="month-nav"><button class="navbtn" id="bprev">&#8249;</button><span class="mlbl" id="bmlbl"></span><button class="navbtn" id="bnext">&#8250;</button></div>
      <button class="mbtn sm primary" onclick="openBudgetSet()">예산 수정</button>
    </div>
    <div class="budget-outer">
      <div><div class="b-dhd" id="b-dhd"></div><div class="b-cgrid" id="b-cgrid"></div></div>
      <div class="budget-side" id="b-side-panel">
        <div class="card">
          <div class="card-head"><span class="card-title">카테고리 예산</span><button class="mbtn sm" onclick="openBudgetSet()">수정</button></div>
          <div id="b-cat-rows"></div>
          <div class="ftotal"><span>합계</span><span id="b-cat-total"></span></div>

function getSpent(cur,cats){
  const y=cur.getFullYear(),mo=cur.getMonth();let t=0;
  Object.entries(S.expenses||{}).forEach(([k,evs])=>{const[ky,km]=k.split('-').map(Number);if(ky===y&&km===mo+1)evs.forEach(e=>{if(!cats||cats.includes(e.cat))t+=e.amt;});});

}

function buildLedgerCal(y,mo){

      if(evs.length){const tot=evs.reduce((s,e)=>s+e.amt,0);const dt=document.createElement('div');dt.className='dtot';dt.textContent=fmt(tot);div.appendChild(dt);evs.slice(0,3).forEach(ev=>{const c=CC[ev.cat]||{bg:'#f1efe8',tx:'#5f5e5a'};const b=document.createElement('div');b.className='cbadge';b.style.background=c.bg;b.style.color=c.tx;b.innerHTML='<span class="bn">'+ev.cat+'</span><span class="ba">'+fmt(ev.amt)+'</span>';div.appendChild(b);});if(evs.length>3){const m2=document.createElement('div');m2.style.cssText='font-size:8px;color:var(--txt3)';m2.textContent='+'+( evs.length-3);div.appendChild(m2);}}

      div.onclick=()=>oExp(y,mo,d);cg.appendChild(div);

  }
}

function drawPie(tot){
  const cv=document.getElementById('pie-chart');if(!cv||!tot)return;
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);
  const cx=cv.width/2,cy=cv.height/2,r=cx-6;let angle=-Math.PI/2;
  (S.assets||[]).forEach((a,i)=>{const sl=(a.val/tot)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+sl);ctx.closePath();ctx.fillStyle=IC[i%IC.length];ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();angle+=sl;});
  ctx.beginPath();ctx.arc(cx,cy,r*0.48,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  document.getElementById('pie-legend').innerHTML=(S.assets||[]).map((a,i)=>{const p=Math.round(a.val/tot*100);return '<div class="ple"><div class="ple-l"><span class="ple-sq" style="background:'+IC[i%IC.length]+'"></span><span>'+a.name+'</span></div><span style="font-weight:500">'+p+'%</span></div>';}).join('');
}

function renderProj(){
  const tot=(S.assets||[]).reduce((s,a)=>s+a.val,0);
  if(!tot)return;
  const rateEl=document.getElementById('proj-rate-input');
  const rate=rateEl?parseFloat(rateEl.value)||4.5:4.5;
  // 이번연도 목표저축 평균 계산
  const thisYear=new Date().getFullYear();
  let savSum=0,savCount=0;
  for(let m=0;m<12;m++){
    const k=thisYear+'-'+String(m+1).padStart(2,'0');
    const g=S.monthlyGoals[k];
    if(g){const t=(g.target||[]).reduce((s,x)=>s+x.amt,0);if(t>0){savSum+=t;savCount++;}}
  }
  const monthSave=savCount>0?Math.round(savSum/savCount):0;
  const mRate=rate/100/12;
  function proj(months){
    let v=tot;
    for(let i=0;i<months;i++)v=v*(1+mRate)+monthSave;
    return Math.round(v);
  }
  const y1=proj(12),y3=proj(36),y5=proj(60);
  function fmtP(n){if(n>=100000000)return (n/100000000).toFixed(1)+'억';if(n>=10000000)return Math.round(n/10000000)+'천만';return Math.round(n/10000)+'만원';}
  function fmtAdd(n){const d=n-tot;return (d>=0?'+':'')+fmtP(Math.abs(d));}
  const el=id=>document.getElementById(id);
  if(el('proj-y1'))el('proj-y1').textContent=fmtP(y1);
  if(el('proj-y3'))el('proj-y3').textContent=fmtP(y3);
  if(el('proj-y5'))el('proj-y5').textContent=fmtP(y5);
  if(el('proj-y1-add'))el('proj-y1-add').textContent=fmtAdd(y1);
  if(el('proj-y3-add'))el('proj-y3-add').textContent=fmtAdd(y3);
  if(el('proj-y5-add'))el('proj-y5-add').textContent=fmtAdd(y5);
  if(el('proj-monthly-save'))el('proj-monthly-save').textContent=monthSave?'월 평균 목표저축 '+fmtP(monthSave):'목표저축 미설정';
  // 수익률 변경시 즉시 재계산
  if(rateEl&&!rateEl._bound){rateEl._bound=true;rateEl.addEventListener('input',renderProj);}
}

  ar.appendChild(ai);ar.appendChild(ab);inner.appendChild(ar);
  const bg2=document.createElement('div');bg2.className='sgap';
  const bTitle=document.createElement('div');bTitle.className='sec-title';bTitle.textContent='💰 예산 항목';bg2.appendChild(bTitle);
  const bList=document.createElement('div');
  const renderB=()=>{bList.innerHTML='';dd.budgets.forEach((b,i)=>{const c=CC[b.cat]||{bg:'#f1efe8',tx:'#5f5e5a',br:'#888'};const d2=document.createElement('div');d2.className='ev-item';d2.style.background=c.bg;d2.innerHTML='<span style="width:6px;height:6px;border-radius:50%;background:'+c.br+';flex-shrink:0"></span><span style="color:'+c.tx+';font-weight:500">'+b.cat+'</span>'+(b.memo?'<span style="color:'+c.tx+';font-size:10px;margin-left:3px">· '+b.memo+'</span>':'')+'<span style="font-weight:500;color:'+c.tx+';margin-left:auto">'+fmt(b.amt)+'</span>';const del=document.createElement('button');del.className='ev-del';del.textContent='×';del.onclick=()=>{dd.budgets.splice(i,1);persist();rB();renderB();};d2.appendChild(del);bList.appendChild(d2);});};
  renderB();bg2.appendChild(bList);
  const brow=document.createElement('div');brow.style.cssText='display:flex;gap:5px;margin-bottom:.45rem';
  const bsel=document.createElement('select');bsel.style.cssText='flex:1.2;font-size:12px;padding:8px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--txt);margin-bottom:0';
  BCATS.forEach(c=>{const o=document.createElement('option');o.textContent=c;bsel.appendChild(o);});

  bamt.addEventListener('keydown',e=>{if(e.key==='Enter')bbtn.click();});
  brow.appendChild(bsel);brow.appendChild(bamt);brow.appendChild(bbtn);bg2.appendChild(brow);bg2.appendChild(bmemo);inner.appendChild(bg2);

  const sb=document.createElement('button');sb.className='mbtn primary';sb.textContent='저장';
  sb.onclick=()=>{const a=parseInt(amt.value);if(!a)return;if(!S.fixedExpenses[k])S.fixedExpenses[k]=[];S.fixedExpenses[k].push({cat:sel.value,amt:a});persist();rF();renderList();amt.value='';};
  amt.addEventListener('keydown',e=>{if(e.key==='Enter')sb.click();});

function oMGoal(y,m){
  const k=y+'-'+String(m+1).padStart(2,'0');
  if(!S.monthlyGoals[k])S.monthlyGoals[k]={target:[],actual:[],current:null};
  const g=S.monthlyGoals[k];
  const autoCurrent=getAutoCurrentAmt(m);
  cm();const bd=document.createElement('div');bd.className='modal-backdrop';bd.id='mwrap';bd.onclick=e=>{if(e.target===bd)cm();};
  const modal=document.createElement('div');modal.className='modal';
  const h3=document.createElement('h3');h3.textContent=(m+1)+'월 수입 / 저축';modal.appendChild(h3);
  // 수입 섹션
  const incWrap=document.createElement('div');incWrap.style.marginBottom='.1rem';
  const incLbl=document.createElement('div');incLbl.className='slbl';incLbl.textContent='이번 달 수입';incWrap.appendChild(incLbl);
  const incInp=document.createElement('input');incInp.type='text';incInp.placeholder='수입 금액';
  const curIncome=S.monthlyIncome[k]||0;
  incInp.value=curIncome?curIncome.toLocaleString():'';
  incWrap.appendChild(incInp);modal.appendChild(incWrap);
  // 현재금액 섹션
  const curWrap=document.createElement('div');curWrap.className='sgap';
  const curLbl=document.createElement('div');curLbl.className='slbl';curLbl.textContent='현재 금액';curWrap.appendChild(curLbl);
  const curRow=document.createElement('div');curRow.style.cssText='display:flex;gap:6px;align-items:center;margin-bottom:.5rem';
  const curInp=document.createElement('input');curInp.type='text';curInp.style.margin='0';curInp.placeholder='직접 입력 (원)';
  curInp.value=g.current!=null?g.current.toLocaleString():'';
  const curAutoLbl=document.createElement('span');curAutoLbl.style.cssText='font-size:10px;color:var(--txt3);white-space:nowrap;flex-shrink:0';
  curAutoLbl.textContent=autoCurrent!=null?('자동: '+fmtS(autoCurrent)):'';
  curRow.appendChild(curInp);curRow.appendChild(curAutoLbl);curWrap.appendChild(curRow);
  modal.appendChild(curWrap);
  const mkSection=(items,label,bgColor,colorTx)=>{
    const wrap=document.createElement('div');wrap.className='sgap';
    const title=document.createElement('div');title.className='sec-title';title.textContent=label;wrap.appendChild(title);
    const list=document.createElement('div');
    const render=()=>{
      list.innerHTML='';
      items.forEach((x,i)=>{
        const d2=document.createElement('div');d2.className='ev-item';d2.style.background=bgColor;
        d2.innerHTML='<span style="color:'+colorTx+';font-weight:500">'+x.item+'</span><span style="margin-left:auto;font-weight:500;color:'+colorTx+'">'+x.amt.toLocaleString()+'원</span>';
        const del=document.createElement('button');del.className='ev-del';del.textContent='×';
        del.onclick=()=>{items.splice(i,1);persist();rG();render();updateProj();};
        d2.appendChild(del);list.appendChild(d2);
      });
    };
    render();wrap.appendChild(list);
    const row=document.createElement('div');row.style.cssText='display:flex;gap:5px;margin-bottom:.35rem';
    const sel=document.createElement('select');sel.style.cssText='flex:1.2;font-size:12px;padding:8px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--txt);margin-bottom:0';
    SAVING_ITEMS.forEach(s=>{const o=document.createElement('option');o.textContent=s;sel.appendChild(o);});
    // 기타직접입력칸
    const customInp=document.createElement('input');customInp.type='text';customInp.placeholder='항목명 직접입력';customInp.style.cssText='display:none;margin-bottom:.35rem';
    sel.onchange=()=>{customInp.style.display=sel.value==='기타(직접입력)'?'block':'none';};
    const inp=document.createElement('input');inp.type='text';inp.placeholder='금액';inp.style.cssText='flex:1;margin-bottom:0';
    const btn=document.createElement('button');btn.className='mbtn primary';btn.textContent='추가';btn.style.flexShrink='0';
    btn.onclick=()=>{
      const a=parseCur(inp.value);if(!a)return;
      const itemName=sel.value==='기타(직접입력)'?(customInp.value.trim()||'기타'):sel.value;
      items.push({item:itemName,amt:a});inp.value='';customInp.value='';customInp.style.display='none';sel.value=SAVING_ITEMS[0];
      persist();rG();render();updateProj();
    };
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')btn.click();});
    row.appendChild(sel);row.appendChild(inp);row.appendChild(btn);
    wrap.appendChild(customInp);wrap.appendChild(row);
    // 목표달성 가안 박스 (목표 섹션에만)
    if(label.includes('목표')){
      const projBox=document.createElement('div');projBox.className='proj-box';projBox.id='proj-box-'+m;
      const pLbl=document.createElement('div');pLbl.className='proj-lbl';pLbl.textContent='목표 달성시 현재금액 가안';
      const pVal=document.createElement('div');pVal.className='proj-val';pVal.id='proj-val-'+m;
      projBox.appendChild(pLbl);projBox.appendChild(pVal);wrap.appendChild(projBox);
    }
    return wrap;
  };
  modal.appendChild(mkSection(g.target,'🎯 목표 저축','#edfaf4','#056b47'));
  modal.appendChild(mkSection(g.actual,'✅ 실제 저축','#e6f1fb','#0c447c'));
  const updateProj=()=>{
    const pv=document.getElementById('proj-val-'+m);if(!pv)return;
    const cur=parseCur(curInp.value)||(autoCurrent||0);
    const tamt=(g.target||[]).reduce((s,x)=>s+x.amt,0);
    pv.textContent=fmt(cur+tamt);
  };
  curInp.addEventListener('input',updateProj);
  updateProj();
  const footer=document.createElement('div');footer.className='mfooter';
  const cb=document.createElement('button');cb.className='mbtn';cb.textContent='저장 후 닫기';
  cb.onclick=()=>{
    const incV=parseCur(incInp.value);if(incV)S.monthlyIncome[k]=incV;else delete S.monthlyIncome[k];
    const v=parseCur(curInp.value);g.current=v||null;
    persist();rG();cm();
  };
  footer.appendChild(cb);modal.appendChild(footer);
  bd.appendChild(modal);document.getElementById('modal-area').appendChild(bd);am=bd;
}
