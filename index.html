<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💰</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#F5F0EB; --card:#FFFFFF; --black:#1C1C1E; --grey:#8E8E93;
  --light:#E8E3DE; --red:#E8526A; --green:#34A853; --border:#E0DAD4;
  --accent:#C4A882; --pink-light:#FDF0F2;
}
html,body { height:100%; background:#2a2a2a; }
body { font-family:'Noto Sans KR',sans-serif; display:flex; justify-content:center; align-items:flex-start; }

/* ── 앱 래퍼 ── */
.app { width:100%; max-width:430px; min-height:100vh; background:var(--bg); position:relative; overflow:hidden; }

/* ── 로그인 ── */
#loginScreen {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:999;
}
.login-title { font-size:28px; font-weight:900; color:var(--black); margin-bottom:8px; }
.login-sub { font-size:13px; color:var(--grey); margin-bottom:40px; }
.login-input {
  width:240px; padding:14px 18px; background:var(--light); border:none;
  border-radius:14px; font-size:20px; text-align:center; letter-spacing:8px;
  color:var(--black); font-family:inherit; outline:none; margin-bottom:16px;
}
.login-btn {
  width:240px; padding:15px; background:var(--black); color:#fff;
  border:none; border-radius:14px; font-size:15px; font-weight:600;
  font-family:inherit; cursor:pointer;
}
.login-error { color:var(--red); font-size:12px; margin-top:8px; height:16px; }

/* ── 탭 콘텐츠 ── */
.tab-content { display:none; padding-bottom:90px; min-height:100vh; }
.tab-content.active { display:block; }

/* ── 공통 헤더 ── */
.page-header {
  padding:52px 20px 0;
  display:flex; align-items:center; justify-content:space-between;
}
.page-header h1 { font-size:13px; font-weight:700; color:var(--black); }
.header-action { font-size:12px; color:var(--accent); cursor:pointer; }

/* ── 월 네비 ── */
.month-nav {
  display:flex; align-items:center; justify-content:center;
  gap:20px; padding:16px 20px 0;
}
.month-nav button {
  width:28px; height:28px; border:none; background:var(--light);
  border-radius:50%; cursor:pointer; font-size:16px; color:var(--black);
  display:flex; align-items:center; justify-content:center;
  transition:background .15s;
}
.month-nav button:hover { background:var(--border); }
.month-text { font-size:17px; font-weight:700; color:var(--black); min-width:120px; text-align:center; }

/* ── 요약 카드 3개 ── */
.summary-3 {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:8px; padding:16px 16px 0;
}
.s-card {
  background:var(--card); border-radius:14px; padding:14px 10px; text-align:center;
  cursor:pointer;
}
.s-label { font-size:10px; color:var(--grey); margin-bottom:5px; }
.s-val { font-size:14px; font-weight:700; color:var(--black); letter-spacing:-.5px; }
.s-val.red { color:var(--red); }
.s-val.green { color:var(--green); }

/* ── 예산 바 ── */
.bar-wrap { padding:12px 16px 0; }
.bar-card { background:var(--card); border-radius:14px; padding:14px 16px; }
.bar-row { display:flex; justify-content:space-between; margin-bottom:8px; }
.bar-row span { font-size:11px; color:var(--grey); }
.bar-row .pct { font-weight:700; }
.bar-track { height:5px; background:var(--light); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition:width .8s cubic-bezier(.4,0,.2,1); }
.bar-fill.red { background:var(--red); }
.bar-fill.green { background:var(--green); }

/* ── 섹션 타이틀 ── */
.sec-title { padding:20px 16px 10px; font-size:13px; font-weight:700; color:var(--black); }

/* ── 카테고리 잔여 리스트 ── */
.cat-list { padding:0 16px; display:flex; flex-direction:column; gap:8px; }
.cat-item {
  background:var(--card); border-radius:14px; padding:14px 16px;
  display:flex; align-items:center; gap:12px;
}
.cat-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.cat-info { flex:1; }
.cat-name { font-size:13px; font-weight:600; color:var(--black); }
.cat-sub { font-size:11px; color:var(--grey); margin-top:2px; }
.cat-amt { text-align:right; }
.cat-amt .amt { font-size:14px; font-weight:700; }
.cat-amt .budget { font-size:10px; color:var(--grey); margin-top:2px; }

/* ── 달력 ── */
.cal-wrap { padding:12px 16px 0; }
.cal-card { background:var(--card); border-radius:16px; overflow:hidden; }
.cal-header {
  display:grid; grid-template-columns:repeat(7,1fr);
  background:var(--light); padding:8px 0;
}
.cal-day-label { text-align:center; font-size:10px; color:var(--grey); font-weight:600; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); }
.cal-cell {
  min-height:52px; padding:4px 3px; border-top:1px solid var(--border);
  font-size:11px;
}
.cal-cell .day-num { font-size:11px; font-weight:600; color:var(--black); margin-bottom:2px; }
.cal-cell .day-num.today {
  background:var(--black); color:#fff; border-radius:50%;
  width:18px; height:18px; display:flex; align-items:center; justify-content:center;
}
.cal-cell .day-amt { font-size:10px; color:var(--red); font-weight:600; }
.cal-cell .day-entry { font-size:9px; color:var(--grey); line-height:1.3; }
.cal-cell.other-month .day-num { color:var(--grey); opacity:.4; }

/* ── 지출 입력 폼 ── */
.input-card {
  margin:12px 16px 0; background:var(--card); border-radius:16px; padding:16px;
}
.input-row { display:flex; gap:8px; margin-bottom:8px; }
.input-row:last-child { margin-bottom:0; }
.inp {
  flex:1; padding:11px 12px; background:var(--light); border:none;
  border-radius:10px; font-size:13px; font-family:inherit; color:var(--black); outline:none;
}
.inp::placeholder { color:var(--grey); }
.inp-btn {
  padding:11px 18px; background:var(--black); color:#fff; border:none;
  border-radius:10px; font-size:13px; font-weight:600; font-family:inherit;
  cursor:pointer; white-space:nowrap;
}

/* ── 쇼핑 결산 아이템 카드 ── */
.items-list { padding:0 16px; display:flex; flex-direction:column; gap:10px; }
.item-card {
  background:var(--card); border-radius:16px; overflow:hidden;
  display:flex; align-items:stretch;
}
.item-img {
  width:88px; height:88px; flex-shrink:0; background:var(--light);
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden; cursor:pointer;
}
.item-img img { width:100%; height:100%; object-fit:cover; }
.img-hint {
  position:absolute; bottom:0; left:0; right:0;
  background:rgba(0,0,0,.35); color:#fff; font-size:9px;
  text-align:center; padding:3px; opacity:0; transition:opacity .2s;
}
.item-img:hover .img-hint { opacity:1; }
.item-info { flex:1; padding:13px 13px 13px 12px; display:flex; flex-direction:column; justify-content:space-between; }
.item-brand { font-size:10px; color:var(--accent); font-weight:600; letter-spacing:.5px; text-transform:uppercase; }
.item-row { display:flex; justify-content:space-between; align-items:flex-start; }
.item-name { font-size:14px; font-weight:600; color:var(--black); margin:3px 0; line-height:1.3; }
.item-price { font-size:15px; font-weight:700; color:var(--black); letter-spacing:-.5px; }
.item-del { background:none; border:none; color:var(--light); font-size:16px; cursor:pointer; transition:color .15s; }
.item-del:hover { color:var(--red); }

/* ── 추가 버튼 ── */
.add-btn {
  margin:10px 16px 0; padding:14px; background:var(--card);
  border:1.5px dashed var(--border); border-radius:16px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  cursor:pointer; color:var(--grey); font-size:13px; font-family:inherit;
  width:calc(100% - 32px); transition:all .15s;
}
.add-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── 빈 상태 ── */
.empty { text-align:center; padding:48px 20px; color:var(--grey); font-size:13px; }
.empty-emoji { font-size:44px; margin-bottom:12px; }

/* ── 모달 ── */
.overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
  z-index:200; align-items:flex-end; justify-content:center;
}
.overlay.show { display:flex; }
.modal {
  background:var(--bg); border-radius:24px 24px 0 0;
  padding:20px 20px 44px; width:100%; max-width:430px;
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
.modal-title { font-size:17px; font-weight:700; color:var(--black); margin-bottom:18px; }
.form-group { margin-bottom:12px; }
.form-label { font-size:11px; color:var(--grey); margin-bottom:5px; display:block; }
.form-input {
  width:100%; padding:12px 14px; background:var(--card); border:1.5px solid var(--border);
  border-radius:12px; font-size:14px; font-family:inherit; color:var(--black); outline:none;
  transition:border-color .15s; -webkit-appearance:none;
}
.form-input:focus { border-color:var(--accent); }
.form-row { display:flex; gap:8px; }
.form-row .form-group { flex:1; }
.img-upload-area {
  width:100%; height:140px; background:var(--light); border-radius:14px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; border:2px dashed var(--border); transition:all .15s;
  overflow:hidden; position:relative; margin-bottom:14px;
}
.img-upload-area img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
.img-upload-area:hover { border-color:var(--accent); }
.upload-ico { font-size:28px; margin-bottom:6px; }
.upload-txt { font-size:12px; color:var(--grey); }
.modal-btn {
  width:100%; padding:15px; background:var(--black); color:#fff; border:none;
  border-radius:14px; font-size:15px; font-weight:600; font-family:inherit;
  cursor:pointer; margin-top:6px; transition:opacity .15s;
}
.modal-btn:hover { opacity:.85; }

/* ── 탭바 ── */
.tab-bar {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:430px;
  background:rgba(245,240,235,.95); backdrop-filter:blur(20px);
  border-top:1px solid var(--border); display:flex; padding:6px 0 20px; z-index:100;
}
.tab-item {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; padding:6px 0; color:var(--grey); font-size:9.5px; transition:color .15s;
}
.tab-item.active { color:var(--black); }
.tab-icon { font-size:21px; }

/* ── 고정비 테이블 ── */
.fixed-list { padding:0 16px; display:flex; flex-direction:column; gap:8px; }
.fixed-item {
  background:var(--card); border-radius:14px; padding:14px 16px;
  display:flex; justify-content:space-between; align-items:center;
}
.fixed-name { font-size:13px; font-weight:600; color:var(--black); }
.fixed-date { font-size:11px; color:var(--grey); margin-top:2px; }
.fixed-amt { font-size:15px; font-weight:700; color:var(--black); }

/* ── 목표 카드 ── */
.goal-card {
  margin:12px 16px 0; background:var(--card); border-radius:16px; padding:20px;
}
.goal-title { font-size:15px; font-weight:700; color:var(--black); margin-bottom:4px; }
.goal-sub { font-size:12px; color:var(--grey); margin-bottom:16px; }
.goal-amounts { display:flex; justify-content:space-between; margin-bottom:12px; }
.goal-amt-item .gl { font-size:10px; color:var(--grey); margin-bottom:3px; }
.goal-amt-item .gv { font-size:16px; font-weight:700; color:var(--black); }

/* ── 여행 카드 ── */
.trip-card {
  margin:12px 16px 0; background:var(--card); border-radius:16px; padding:20px;
}
.trip-title { font-size:15px; font-weight:700; color:var(--black); margin-bottom:16px; }
</style>
</head>
<body>

<!-- 로그인 -->
<div id="loginScreen">
  <div style="font-size:40px;margin-bottom:16px">💰</div>
  <div class="login-title">가계부</div>
  <div class="login-sub">비밀번호를 입력하세요</div>
  <input class="login-input" type="password" id="pwInput" maxlength="4" placeholder="····" onkeydown="if(event.key==='Enter')checkPw()">
  <button class="login-btn" onclick="checkPw()">입력</button>
  <div class="login-error" id="pwError"></div>
</div>

<div class="app" id="mainApp" style="display:none">

  <!-- ════════ 가계부 탭 ════════ -->
  <div class="tab-content active" id="tab-home">
    <div class="page-header">
      <h1>💰 가계부</h1>
      <span class="header-action" onclick="openPwChange()">🔒 비번설정</span>
    </div>
    <div class="month-nav">
      <button onclick="changeHomeMonth(-1)">‹</button>
      <div class="month-text" id="homeMonthText"></div>
      <button onclick="changeHomeMonth(1)">›</button>
    </div>
    <div class="summary-3" id="homeSummary"></div>
    <div class="bar-wrap">
      <div class="bar-card">
        <div class="bar-row"><span>예산 사용률</span><span class="pct" id="homePct">0%</span></div>
        <div class="bar-track"><div class="bar-fill" id="homeBar" style="width:0%"></div></div>
      </div>
    </div>
    <!-- 지출 입력 -->
    <div class="input-card">
      <div class="input-row">
        <input class="inp" id="expDate" type="date" style="flex:.8">
        <select class="inp" id="expCat" style="flex:1.2">
          <option value="">카테고리</option>
        </select>
      </div>
      <div class="input-row">
        <input class="inp" id="expDesc" placeholder="내용" style="flex:2">
        <input class="inp" id="expAmt" type="number" placeholder="금액" style="flex:1.2" inputmode="numeric">
        <button class="inp-btn" onclick="addExpense()">추가</button>
      </div>
    </div>
    <div class="sec-title" id="homeSecTitle">카테고리별 잔여</div>
    <div class="cat-list" id="homeCatList"></div>
    <div style="height:20px"></div>
  </div>

  <!-- ════════ 예산 탭 ════════ -->
  <div class="tab-content" id="tab-budget">
    <div class="page-header">
      <h1>📋 예산</h1>
      <span class="header-action" onclick="openBudgetEdit()">수정</span>
    </div>
    <div class="month-nav">
      <button onclick="changeBudgetMonth(-1)">‹</button>
      <div class="month-text" id="budgetMonthText"></div>
      <button onclick="changeBudgetMonth(1)">›</button>
    </div>
    <div class="sec-title">카테고리 예산</div>
    <div class="cat-list" id="budgetCatList"></div>
    <div style="height:20px"></div>
  </div>

  <!-- ════════ 쇼핑 결산 탭 ════════ -->
  <div class="tab-content" id="tab-shop">
    <div class="page-header">
      <h1>🛍️ 쇼핑 결산보고</h1>
    </div>
    <div class="month-nav">
      <button onclick="changeShopMonth(-1)">‹</button>
      <div class="month-text" id="shopMonthText"></div>
      <button onclick="changeShopMonth(1)">›</button>
    </div>
    <div class="summary-3" id="shopSummary"></div>
    <div class="bar-wrap">
      <div class="bar-card">
        <div class="bar-row"><span>예산 사용률</span><span class="pct" id="shopPct">0%</span></div>
        <div class="bar-track"><div class="bar-fill" id="shopBar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="sec-title" id="shopSecTitle">구매 내역</div>
    <div class="items-list" id="shopItemsList"></div>
    <button class="add-btn" onclick="openShopModal()">＋ 아이템 추가</button>
    <div style="height:20px"></div>
  </div>

  <!-- ════════ 고정비 탭 ════════ -->
  <div class="tab-content" id="tab-fixed">
    <div class="page-header">
      <h1>📌 고정비</h1>
      <span class="header-action" onclick="openFixedModal()">＋ 추가</span>
    </div>
    <div class="month-nav">
      <button onclick="changeFixedMonth(-1)">‹</button>
      <div class="month-text" id="fixedMonthText"></div>
      <button onclick="changeFixedMonth(1)">›</button>
    </div>
    <div class="summary-3" id="fixedSummary"></div>
    <div class="sec-title">고정 지출</div>
    <div class="fixed-list" id="fixedList"></div>
    <div style="height:20px"></div>
  </div>

  <!-- ════════ 여행 탭 ════════ -->
  <div class="tab-content" id="tab-trip">
    <div class="page-header">
      <h1>✈️ 여행</h1>
      <span class="header-action" onclick="openTripModal()">＋ 추가</span>
    </div>
    <div class="sec-title">여행 기록</div>
    <div id="tripList" style="padding:0 16px;display:flex;flex-direction:column;gap:10px;"></div>
    <div style="height:20px"></div>
  </div>

  <!-- 탭바 -->
  <div class="tab-bar">
    <div class="tab-item active" onclick="switchTab('home')" id="tabBtn-home">
      <span class="tab-icon">💰</span><span>가계부</span>
    </div>
    <div class="tab-item" onclick="switchTab('budget')" id="tabBtn-budget">
      <span class="tab-icon">📋</span><span>예산</span>
    </div>
    <div class="tab-item" onclick="switchTab('shop')" id="tabBtn-shop">
      <span class="tab-icon">🛍️</span><span>쇼핑결산</span>
    </div>
    <div class="tab-item" onclick="switchTab('fixed')" id="tabBtn-fixed">
      <span class="tab-icon">📌</span><span>고정비</span>
    </div>
    <div class="tab-item" onclick="switchTab('trip')" id="tabBtn-trip">
      <span class="tab-icon">✈️</span><span>여행</span>
    </div>
  </div>
</div>

<!-- 아이템 추가 모달 -->
<div class="overlay" id="shopModal" onclick="closeOverlay('shopModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">아이템 추가</div>
    <div class="img-upload-area" id="shopImgArea" onclick="document.getElementById('shopImgInput').click()">
      <div class="upload-ico">📷</div>
      <div class="upload-txt">사진 추가 (선택)</div>
      <img id="shopImgPreview" src="" style="display:none">
    </div>
    <input type="file" id="shopImgInput" accept="image/*" style="display:none" onchange="previewShopImg(event)">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">브랜드</label>
        <input class="form-input" id="siBrand" placeholder="ZARA" maxlength="20">
      </div>
      <div class="form-group">
        <label class="form-label">가격 (원)</label>
        <input class="form-input" id="siPrice" type="number" placeholder="89000" inputmode="numeric">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">아이템명</label>
      <input class="form-input" id="siName" placeholder="오버핏 린넨 자켓" maxlength="30">
    </div>
    <button class="modal-btn" onclick="addShopItem()">추가하기</button>
  </div>
</div>

<!-- 예산 수정 모달 (쇼핑) -->
<div class="overlay" id="shopBudgetModal" onclick="closeOverlay('shopBudgetModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">월 패션 예산 설정</div>
    <div class="form-group">
      <label class="form-label">예산 (원)</label>
      <input class="form-input" id="shopBudgetInp" type="number" placeholder="250000" inputmode="numeric">
    </div>
    <button class="modal-btn" onclick="saveShopBudget()">저장</button>
  </div>
</div>

<!-- 고정비 추가 모달 -->
<div class="overlay" id="fixedModal" onclick="closeOverlay('fixedModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">고정비 추가</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">항목명</label>
        <input class="form-input" id="fiName" placeholder="월세">
      </div>
      <div class="form-group">
        <label class="form-label">금액 (원)</label>
        <input class="form-input" id="fiAmt" type="number" placeholder="500000" inputmode="numeric">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">결제일</label>
      <input class="form-input" id="fiDate" placeholder="매월 25일">
    </div>
    <button class="modal-btn" onclick="addFixed()">추가하기</button>
  </div>
</div>

<!-- 여행 추가 모달 -->
<div class="overlay" id="tripModal" onclick="closeOverlay('tripModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">여행 추가</div>
    <div class="form-group">
      <label class="form-label">여행지</label>
      <input class="form-input" id="trDest" placeholder="도쿄">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">예산 (원)</label>
        <input class="form-input" id="trBudget" type="number" placeholder="800000" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-label">날짜</label>
        <input class="form-input" id="trDate" placeholder="6월 말">
      </div>
    </div>
    <button class="modal-btn" onclick="addTrip()">추가하기</button>
  </div>
</div>

<!-- 비번 변경 모달 -->
<div class="overlay" id="pwModal" onclick="closeOverlay('pwModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">비밀번호 변경</div>
    <div class="form-group">
      <label class="form-label">현재 비밀번호</label>
      <input class="form-input" id="pwOld" type="password" maxlength="4">
    </div>
    <div class="form-group">
      <label class="form-label">새 비밀번호</label>
      <input class="form-input" id="pwNew" type="password" maxlength="4">
    </div>
    <button class="modal-btn" onclick="changePw()">변경</button>
  </div>
</div>

<!-- 예산 수정 모달 (전체) -->
<div class="overlay" id="budgetEditModal" onclick="closeOverlay('budgetEditModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">예산 수정</div>
    <div id="budgetEditList" style="max-height:60vh;overflow-y:auto;"></div>
    <button class="modal-btn" onclick="saveBudgetEdit()">저장</button>
  </div>
</div>

<script>
// ════════════════════════════════
// 상태 & 저장
// ════════════════════════════════
const DEFAULT_CATS = [
  {name:'약속', color:'#5B8DEF', budget:451000},
  {name:'식사', color:'#E8526A', budget:61000},
  {name:'카페', color:'#34A853', budget:71000},
  {name:'식재료', color:'#F4A261', budget:80000},
  {name:'생필품', color:'#9B59B6', budget:100000},
  {name:'패션', color:'#E8526A', budget:250000},
  {name:'미용', color:'#1ABC9C', budget:10000},
  {name:'여가', color:'#3498DB', budget:178600},
  {name:'기타', color:'#95A5A6', budget:118400},
];

let S = {
  pw: '1213',
  cats: JSON.parse(JSON.stringify(DEFAULT_CATS)),
  // expenses: { 'YYYY-MM': [{date,cat,desc,amt}] }
  expenses: {},
  // shop: { 'YYYY-MM': {budget, items:[{brand,name,price,imgSrc}]} }
  shop: {},
  // fixed: [{name,amt,date}]
  fixed: [],
  // trips: [{dest,budget,date,spent}]
  trips: [],
  // current months
  homeY:2026, homeM:4,
  budgetY:2026, budgetM:4,
  shopY:2026, shopM:4,
  fixedY:2026, fixedM:4,
};

function save() { try { localStorage.setItem('kgb_v2', JSON.stringify(S)); } catch(e){} }
function load() {
  try {
    const d = localStorage.getItem('kgb_v2');
    if (d) S = {...S, ...JSON.parse(d)};
  } catch(e){}
}

// ════════════════════════════════
// 로그인
// ════════════════════════════════
function checkPw() {
  const v = document.getElementById('pwInput').value;
  if (v === S.pw) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    initAll();
  } else {
    document.getElementById('pwError').textContent = '비밀번호가 틀렸어요';
    document.getElementById('pwInput').value = '';
  }
}
document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPw();
});

function openPwChange() { openOverlay('pwModal'); }
function changePw() {
  const old = document.getElementById('pwOld').value;
  const nw = document.getElementById('pwNew').value;
  if (old !== S.pw) { alert('현재 비밀번호가 틀렸어요'); return; }
  if (!nw) { alert('새 비밀번호를 입력해주세요'); return; }
  S.pw = nw; save();
  closeOverlay('pwModal');
  alert('변경됐어요!');
}

// ════════════════════════════════
// 탭 전환
// ════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('tabBtn-' + name).classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'budget') renderBudget();
  if (name === 'shop') renderShop();
  if (name === 'fixed') renderFixed();
  if (name === 'trip') renderTrip();
}

// ════════════════════════════════
// 유틸
// ════════════════════════════════
function fmt(n) { return Number(n||0).toLocaleString('ko-KR'); }
function monthKey(y,m) { return `${y}-${String(m).padStart(2,'0')}`; }
function monthLabel(y,m) { return `${y}년 ${m}월`; }

function getExpenses(y,m) {
  const k = monthKey(y,m);
  if (!S.expenses[k]) S.expenses[k] = [];
  return S.expenses[k];
}
function getShopMonth(y,m) {
  const k = monthKey(y,m);
  if (!S.shop[k]) S.shop[k] = {budget:250000, items:[]};
  return S.shop[k];
}

// 카테고리 총 지출
function catSpent(y,m,catName) {
  return getExpenses(y,m).filter(e=>e.cat===catName).reduce((s,e)=>s+e.amt,0);
}
function totalSpent(y,m) {
  return getExpenses(y,m).reduce((s,e)=>s+e.amt,0);
}
function totalBudget() {
  return S.cats.reduce((s,c)=>s+c.budget,0);
}

// ════════════════════════════════
// 가계부 탭
// ════════════════════════════════
function changeHomeMonth(d) {
  S.homeM += d;
  if (S.homeM > 12) { S.homeM=1; S.homeY++; }
  if (S.homeM < 1) { S.homeM=12; S.homeY--; }
  save(); renderHome();
}

function renderHome() {
  const y=S.homeY, m=S.homeM;
  document.getElementById('homeMonthText').textContent = monthLabel(y,m);
  const spent = totalSpent(y,m);
  const budget = totalBudget();
  const diff = budget - spent;
  const pct = budget>0 ? Math.round(spent/budget*100) : 0;
  const isOver = diff < 0;

  document.getElementById('homeSummary').innerHTML = `
    <div class="s-card"><div class="s-label">이번 달 지출</div><div class="s-val${isOver?' red':''}">${fmt(spent)}</div></div>
    <div class="s-card"><div class="s-label">월 예산</div><div class="s-val">${fmt(budget)}</div></div>
    <div class="s-card"><div class="s-label">남은 예산</div><div class="s-val${isOver?' red':' green'}">${fmt(diff)}</div></div>
  `;
  const bar = document.getElementById('homeBar');
  bar.style.width = Math.min(pct,100)+'%';
  bar.className = 'bar-fill ' + (isOver?'red':'green');
  document.getElementById('homePct').textContent = pct+'%';

  // 카테고리 리스트
  const list = document.getElementById('homeCatList');
  list.innerHTML = S.cats.map(c => {
    const s = catSpent(y,m,c.name);
    const r = c.budget - s;
    const over = r < 0;
    return `
      <div class="cat-item">
        <div class="cat-dot" style="background:${c.color}"></div>
        <div class="cat-info">
          <div class="cat-name">${c.name}</div>
          <div class="cat-sub">₩${fmt(s)} 지출</div>
        </div>
        <div class="cat-amt">
          <div class="amt" style="color:${over?'var(--red)':'var(--black)'}">${over?'▲':''}${fmt(Math.abs(r))}</div>
          <div class="budget">/ ₩${fmt(c.budget)}</div>
        </div>
      </div>`;
  }).join('');

  // 날짜 기본값
  const today = new Date();
  const dd = document.getElementById('expDate');
  if (!dd.value) dd.value = today.toISOString().split('T')[0];

  // 카테고리 셀렉트
  const sel = document.getElementById('expCat');
  const cur = sel.value;
  sel.innerHTML = '<option value="">카테고리</option>' +
    S.cats.map(c=>`<option value="${c.name}"${c.name===cur?' selected':''}>${c.name}</option>`).join('');
}

function addExpense() {
  const date = document.getElementById('expDate').value;
  const cat = document.getElementById('expCat').value;
  const desc = document.getElementById('expDesc').value.trim();
  const amt = parseInt(document.getElementById('expAmt').value)||0;
  if (!cat||!amt) { alert('카테고리와 금액을 입력해주세요'); return; }
  const k = date ? date.slice(0,7).replace('-','').slice(0,4)+'-'+date.slice(5,7) : monthKey(S.homeY,S.homeM);
  const ym = date ? {y:parseInt(date.slice(0,4)),m:parseInt(date.slice(5,7))} : {y:S.homeY,m:S.homeM};
  getExpenses(ym.y,ym.m).push({date:date||'',cat,desc:desc||cat,amt});
  document.getElementById('expDesc').value='';
  document.getElementById('expAmt').value='';
  save(); renderHome();
}

// ════════════════════════════════
// 예산 탭
// ════════════════════════════════
function changeBudgetMonth(d) {
  S.budgetM += d;
  if (S.budgetM > 12) { S.budgetM=1; S.budgetY++; }
  if (S.budgetM < 1) { S.budgetM=12; S.budgetY--; }
  save(); renderBudget();
}

function renderBudget() {
  const y=S.budgetY, m=S.budgetM;
  document.getElementById('budgetMonthText').textContent = monthLabel(y,m);
  const list = document.getElementById('budgetCatList');
  list.innerHTML = S.cats.map(c => {
    const s = catSpent(y,m,c.name);
    const r = c.budget - s;
    const over = r < 0;
    const pct = c.budget>0 ? Math.min(Math.round(s/c.budget*100),100) : 0;
    return `
      <div class="cat-item" style="flex-direction:column;align-items:stretch;gap:8px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="cat-dot" style="background:${c.color}"></div>
          <div style="flex:1"><div class="cat-name">${c.name}</div></div>
          <div style="text-align:right">
            <div style="font-size:13px;font-weight:700;color:${over?'var(--red)':'var(--black)'}">₩${fmt(s)}</div>
            <div style="font-size:10px;color:var(--grey)">/ ₩${fmt(c.budget)}</div>
          </div>
        </div>
        <div class="bar-track">
          <div class="bar-fill ${over?'red':'green'}" style="width:${pct}%"></div>
        </div>
      </div>`;
  }).join('');
}

function openBudgetEdit() {
  const el = document.getElementById('budgetEditList');
  el.innerHTML = S.cats.map((c,i) => `
    <div class="form-group">
      <label class="form-label">${c.name}</label>
      <input class="form-input" id="be_${i}" type="number" value="${c.budget}" inputmode="numeric">
    </div>`).join('');
  openOverlay('budgetEditModal');
}

function saveBudgetEdit() {
  S.cats.forEach((c,i) => {
    const v = parseInt(document.getElementById('be_'+i).value)||0;
    c.budget = v;
  });
  save(); closeOverlay('budgetEditModal'); renderBudget(); renderHome();
}

// ════════════════════════════════
// 쇼핑 결산 탭
// ════════════════════════════════
let shopImgSrc = null;

function changeShopMonth(d) {
  S.shopM += d;
  if (S.shopM > 12) { S.shopM=1; S.shopY++; }
  if (S.shopM < 1) { S.shopM=12; S.shopY--; }
  save(); renderShop();
}

function renderShop() {
  const y=S.shopY, m=S.shopM;
  document.getElementById('shopMonthText').textContent = monthLabel(y,m);
  const sh = getShopMonth(y,m);
  const total = sh.items.reduce((s,i)=>s+i.price,0);
  const diff = total - sh.budget;
  const isOver = diff > 0;
  const pct = sh.budget>0 ? Math.round(total/sh.budget*100) : 0;

  document.getElementById('shopSummary').innerHTML = `
    <div class="s-card"><div class="s-label">예산</div><div class="s-val">₩${fmt(sh.budget)}</div></div>
    <div class="s-card"><div class="s-label">지출</div><div class="s-val${isOver?' red':''}">₩${fmt(total)}</div></div>
    <div class="s-card" onclick="openShopBudget()" style="cursor:pointer">
      <div class="s-label">${isOver?'초과':'절약'} ✏️</div>
      <div class="s-val ${isOver?'red':'green'}">${isOver?'▲':'▼'}${fmt(Math.abs(diff))}</div>
    </div>
  `;

  const bar = document.getElementById('shopBar');
  bar.style.width = Math.min(pct,100)+'%';
  bar.className = 'bar-fill '+(isOver?'red':'green');
  const pctEl = document.getElementById('shopPct');
  pctEl.textContent = pct+'%';
  pctEl.style.color = isOver?'var(--red)':'var(--green)';

  document.getElementById('shopSecTitle').textContent = `구매 내역 (${sh.items.length}개)`;

  const list = document.getElementById('shopItemsList');
  if (sh.items.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-emoji">🛒</div>이번달 구매 내역이 없어요<br>아이템을 추가해보세요</div>`;
  } else {
    list.innerHTML = sh.items.map((item,i) => `
      <div class="item-card">
        <div class="item-img" onclick="changeShopImg(${i})">
          ${item.imgSrc ? `<img src="${item.imgSrc}" alt="${item.name}">` : `<span style="font-size:28px">${shopEmoji(item.brand)}</span>`}
          <div class="img-hint">사진 변경</div>
        </div>
        <div class="item-info">
          <div>
            <div class="item-row">
              <div class="item-brand">${item.brand||'—'}</div>
              <button class="item-del" onclick="deleteShopItem(${i})">×</button>
            </div>
            <div class="item-name">${item.name}</div>
          </div>
          <div class="item-price">₩${fmt(item.price)}</div>
        </div>
      </div>`).join('');
  }
}

function shopEmoji(brand) {
  if (!brand) return '🛍️';
  const b = brand.toLowerCase();
  if (['zara','h&m','uniqlo','cos','musinsa'].some(s=>b.includes(s))) return '👗';
  if (['nike','adidas','뉴발란스','나이키','아디다스'].some(s=>b.includes(s))) return '👟';
  if (['rinae','주얼','ring','silver'].some(s=>b.includes(s))) return '💍';
  if (['bag','가방'].some(s=>b.includes(s))) return '👜';
  return '🛍️';
}

function openShopModal() {
  shopImgSrc = null;
  document.getElementById('siBrand').value='';
  document.getElementById('siName').value='';
  document.getElementById('siPrice').value='';
  document.getElementById('shopImgPreview').style.display='none';
  document.querySelector('.upload-ico').style.display='block';
  document.querySelector('.upload-txt').style.display='block';
  openOverlay('shopModal');
}

function previewShopImg(e) {
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = ev => {
    shopImgSrc = ev.target.result;
    const img = document.getElementById('shopImgPreview');
    img.src = ev.target.result; img.style.display='block';
    document.querySelector('.upload-ico').style.display='none';
    document.querySelector('.upload-txt').style.display='none';
  };
  r.readAsDataURL(file);
}

function addShopItem() {
  const brand = document.getElementById('siBrand').value.trim();
  const name = document.getElementById('siName').value.trim();
  const price = parseInt(document.getElementById('siPrice').value)||0;
  if (!name||!price) { alert('아이템명과 가격을 입력해주세요'); return; }
  getShopMonth(S.shopY,S.shopM).items.push({brand:brand||'',name,price,imgSrc:shopImgSrc});
  save(); closeOverlay('shopModal'); renderShop();
}

function deleteShopItem(idx) {
  if (!confirm('삭제할까요?')) return;
  getShopMonth(S.shopY,S.shopM).items.splice(idx,1);
  save(); renderShop();
}

function changeShopImg(idx) {
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange = e => {
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload = ev => {
      getShopMonth(S.shopY,S.shopM).items[idx].imgSrc = ev.target.result;
      save(); renderShop();
    };
    r.readAsDataURL(file);
  };
  inp.click();
}

function openShopBudget() {
  document.getElementById('shopBudgetInp').value = getShopMonth(S.shopY,S.shopM).budget;
  openOverlay('shopBudgetModal');
}

function saveShopBudget() {
  const v = parseInt(document.getElementById('shopBudgetInp').value)||0;
  if(v<=0) return;
  getShopMonth(S.shopY,S.shopM).budget = v;
  save(); closeOverlay('shopBudgetModal'); renderShop();
}

// ════════════════════════════════
// 고정비 탭
// ════════════════════════════════
function changeFixedMonth(d) {
  S.fixedM += d;
  if (S.fixedM > 12) { S.fixedM=1; S.fixedY++; }
  if (S.fixedM < 1) { S.fixedM=12; S.fixedY--; }
  save(); renderFixed();
}

function renderFixed() {
  document.getElementById('fixedMonthText').textContent = monthLabel(S.fixedY,S.fixedM);
  const total = S.fixed.reduce((s,f)=>s+f.amt,0);
  document.getElementById('fixedSummary').innerHTML = `
    <div class="s-card"><div class="s-label">고정비 항목</div><div class="s-val">${S.fixed.length}개</div></div>
    <div class="s-card"><div class="s-label">월 총액</div><div class="s-val red">₩${fmt(total)}</div></div>
    <div class="s-card"><div class="s-label">연간 예상</div><div class="s-val" style="font-size:12px">₩${fmt(total*12)}</div></div>
  `;
  const list = document.getElementById('fixedList');
  if (S.fixed.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-emoji">📌</div>고정비를 추가해보세요</div>`;
  } else {
    list.innerHTML = S.fixed.map((f,i) => `
      <div class="fixed-item">
        <div>
          <div class="fixed-name">${f.name}</div>
          <div class="fixed-date">${f.date||''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="fixed-amt">₩${fmt(f.amt)}</div>
          <button class="item-del" onclick="deleteFixed(${i})">×</button>
        </div>
      </div>`).join('');
  }
}

function openFixedModal() { openOverlay('fixedModal'); }
function addFixed() {
  const name=document.getElementById('fiName').value.trim();
  const amt=parseInt(document.getElementById('fiAmt').value)||0;
  const date=document.getElementById('fiDate').value.trim();
  if(!name||!amt){alert('항목명과 금액을 입력해주세요');return;}
  S.fixed.push({name,amt,date});
  document.getElementById('fiName').value='';
  document.getElementById('fiAmt').value='';
  document.getElementById('fiDate').value='';
  save(); closeOverlay('fixedModal'); renderFixed();
}
function deleteFixed(i) {
  if(!confirm('삭제할까요?')) return;
  S.fixed.splice(i,1); save(); renderFixed();
}

// ════════════════════════════════
// 여행 탭
// ════════════════════════════════
function renderTrip() {
  const list = document.getElementById('tripList');
  if (S.trips.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-emoji">✈️</div>여행을 추가해보세요</div>`;
  } else {
    list.innerHTML = S.trips.map((t,i) => {
      const pct = t.budget>0 ? Math.min(Math.round((t.spent||0)/t.budget*100),100) : 0;
      return `
        <div class="trip-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
            <div>
              <div class="trip-title">${t.dest}</div>
              <div style="font-size:12px;color:var(--grey)">${t.date||''}</div>
            </div>
            <button class="item-del" onclick="deleteTrip(${i})">×</button>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <div><div style="font-size:10px;color:var(--grey)">예산</div><div style="font-size:14px;font-weight:700">₩${fmt(t.budget)}</div></div>
            <div style="text-align:right"><div style="font-size:10px;color:var(--grey)">사용</div><div style="font-size:14px;font-weight:700;color:var(--red)">₩${fmt(t.spent||0)}</div></div>
          </div>
          <div class="bar-track"><div class="bar-fill green" style="width:${pct}%"></div></div>
        </div>`;
    }).join('');
  }
}

function openTripModal() { openOverlay('tripModal'); }
function addTrip() {
  const dest=document.getElementById('trDest').value.trim();
  const budget=parseInt(document.getElementById('trBudget').value)||0;
  const date=document.getElementById('trDate').value.trim();
  if(!dest){alert('여행지를 입력해주세요');return;}
  S.trips.push({dest,budget,date,spent:0});
  document.getElementById('trDest').value='';
  document.getElementById('trBudget').value='';
  document.getElementById('trDate').value='';
  save(); closeOverlay('tripModal'); renderTrip();
}
function deleteTrip(i) {
  if(!confirm('삭제할까요?')) return;
  S.trips.splice(i,1); save(); renderTrip();
}

// 오버레이 공통

function openOverlay(id) { document.getElementById(id).classList.add('show'); }
function closeOverlay(id, e) {
  if (!e || e.target===e.currentTarget) document.getElementById(id).classList.remove('show');
}
